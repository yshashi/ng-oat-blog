<!-- ═══════════════════ TOOLBAR ═══════════════════ -->
<ng-oat-toolbar>
  <div class="hstack gap-2" toolbarStart>
    <button toolbarStart data-sidebar-toggle class="ghost" (click)="sidebar.toggle()">☰</button>
    <strong><a routerLink="/">LetsBlog</a></strong>
  </div>

  <div toolbarEnd class="hstack gap-2">
    <ng-oat-theme-selector />
    @if (auth.isLoggedIn()) {
    <ng-oat-button btnStyle="outline" size="small" routerLink="/blogs/create">✏️ Write</ng-oat-button>
    <ng-oat-dropdown>
      <button trigger class="ghost">👤 {{ auth.currentUser()?.name }}</button>
      <a role="menuitem" routerLink="/profile">My Profile</a>
      <a role="menuitem" routerLink="/blogs/create">Write a Post</a>
      <hr />
      <button role="menuitem" (click)="logout()">Sign Out</button>
    </ng-oat-dropdown>
    } @else {
    <ng-oat-button btnStyle="outline" size="small" routerLink="/login">Sign In</ng-oat-button>
    <ng-oat-button btnStyle="filled" size="small" routerLink="/register">Get Started</ng-oat-button>
    }
  </div>
</ng-oat-toolbar>

<div ngOatSidebar #sidebar="ngOatSidebar" data-sidebar-layout style="--topnav-offset:var(--space-12)">
  <aside data-sidebar>

    <nav>
      <ul>
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">🏠 Home</a></li>
        <li><a routerLink="/blogs" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">📖 Blogs</a></li>
        <li><a routerLink="/about" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">ℹ️ About</a></li>
        <ng-oat-separator />
        @if (auth.isLoggedIn()) {
        <li><a routerLink="/profile" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">👤 My
            Profile</a></li>
        <li><a routerLink="/blogs/create" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">✏️ Write a
            Post</a></li>
        } @else {
        <div class="vstack gap-2 mt-2">
          <ng-oat-button btnStyle="outline" size="small" routerLink="/login">Sign In</ng-oat-button>
          <ng-oat-button btnStyle="filled" size="small" routerLink="/register">Get Started</ng-oat-button>
        </div>
        }
      </ul>
    </nav>

    <footer>
      <p class="text-xs">
        Built with
        <a href="https://ng-oat.letsprogram.in" target="_blank" rel="noopener">&#64;letsprogram/ng-oat</a>
      </p>
    </footer>
  </aside>

  <main class="container mt-4">
    <router-outlet />
  </main>
</div>
