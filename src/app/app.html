<ng-oat-toolbar>
  <button toolbarStart data-sidebar-toggle class="ghost" (click)="sd.toggle()">☰</button>
  <strong toolbarStart>🌾 Let's Blog</strong>

  <span toolbarEnd class="hstack gap-2">
    <ng-oat-theme-selector />
    @if(auth.isLoggedIn()) {
    <ng-oat-dropdown #dd (openChange)="onToggle($event)">
      <button trigger class="ghost">👻 {{auth.currentUser()?.name || 'Sky'}}</button>
      <button role="menuitem">My Profile</button>
      <button role="menuitem">Write a post</button>
      <hr>
      <button role="menuitem">Logout</button>
    </ng-oat-dropdown>

    } @else {
    <ng-oat-button routerLink="/login" btnStyle="outline" size="small">Login</ng-oat-button>
    <ng-oat-button routerLink="/register" btnStyle="filled" size="small">Get Started</ng-oat-button>
    }

  </span>
</ng-oat-toolbar>

<div ngOatSidebar #sd="ngOatSidebar" data-sidebar-layout style="--topnav-offset: var(--space-12)">
  <aside data-sidebar>
    <nav>
      <ul>
        <li><a routerLink="/" routerLinkActive="active">🏠 Home</a></li>
        <li><a routerLink="/blogs" routerLinkActive="active">📖 Blogs</a></li>
        <li><a routerLink="/about" routerLinkActive="active">ℹ️ About</a></li>
        <ng-oat-separator />
        @if (auth.isLoggedIn()) {
        <li><a routerLink="/profile" routerLinkActive="active">👤 My
            Profile</a></li>
        <li><a routerLink="/blogs/create" routerLinkActive="active">✏️ Write a
            Post</a></li>
        } @else {
        <div class="vstack gap-2">
          <ng-oat-button btnStyle="outline" size="small" routerLink="/login">Sign In</ng-oat-button>
          <ng-oat-button btnStyle="filled" size="small" routerLink="/register">Get Started</ng-oat-button>
        </div>
        }
      </ul>
    </nav>
  </aside>

  <main class="container mt-4">
    <router-outlet />
  </main>
</div>
